services:
    web1:
        container_name: "sugar-web1"
        image: sugar_php82_web
        build:
            context: ../../
            dockerfile: images/php/82/apache/Dockerfile
        ports:
            - "80:80"
        extra_hosts:
            - "docker.local:127.0.0.1"
        environment:
            - "APACHE_RUN_USER=sugar"
            - "APACHE_RUN_GROUP=sugar"
        volumes:
            - ../../data/app:/var/www/html
            - ../../images/php/82/apache/config/php/docker.ini:/usr/local/etc/php/conf.d/docker.ini
        depends_on:
            - sqlserver
            - elasticsearch
            - redis
            - permissions
        links:
            - sqlserver
            - elasticsearch
            - redis
    cron:
        container_name: "sugar-cron"
        image: sugar_php82_cron
        build:
            context: ../../
            dockerfile: images/php/82/cron/Dockerfile
        volumes:
            - ../../data/app:/var/www/html
            - ../../images/php/82/cron/config/php/docker.ini:/usr/local/etc/php/conf.d/docker.ini
        depends_on:
            - sqlserver
            - elasticsearch
            - redis
            - permissions
        links:
            - sqlserver
            - elasticsearch
            - redis
    sqlserver:
        container_name: "sugar-sqlserver"
        image: mcr.microsoft.com/mssql/server:2019-latest
        ports:
            - "1433:1433"
        environment:
            - "ACCEPT_EULA=Y"
            - "SA_PASSWORD=Sugar123!"
            - "MSSQL_PID=Express"
        volumes:
            - sqlserver-data:/var/opt/mssql
    elasticsearch:
        image: elasticsearch:8.4.3
        container_name: "sugar-elasticsearch"
        ports:
            - 9200:9200
            - 9300:9300
        volumes:
            - es-data01:/usr/share/elasticsearch/data
        environment:
            - node.name=sugar1
            - cluster.name=sugarcrm13
            - discovery.type=single-node
            - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
            - xpack.security.enabled=false
        ulimits:
            memlock:
                soft: -1
                hard: -1
            nofile:
                soft: 65536
                hard: 65536
    redis:
        container_name: "sugar-redis"
        image: redis:latest
        volumes:
            - ../../data/redis:/data
    permissions:
        container_name: "sugar-permissions"
        image: sugar_permissions
        build: ../../images/permissions
        volumes:
            - ../../data/app:/var/www/html
    testsmtp:
        container_name: "sugar-smtp"
        image: sugar_testsmtp
        build: ../../images/testsmtp

volumes:
    es-data01:
        driver: local
    sqlserver-data:
        driver: local
